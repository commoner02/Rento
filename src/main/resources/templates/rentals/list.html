<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Rentals')}"></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/base :: sidebar('rentals')}"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Rentals</div>
      <a th:href="@{/rentals/new}" sec:authorize="hasRole('BUYER')" class="btn btn-primary btn-sm">+ New Rental</a>
    </div>
    <div class="page-content">
      <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th sec:authorize="hasAnyRole('SELLER','ADMIN')">Customer</th>
                <th>Dates</th>
                <th>Total</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="r : ${rentals}">
                <td th:text="'#' + ${r.id}"></td>
                <td sec:authorize="hasAnyRole('SELLER','ADMIN')" th:text="${r.user.firstName + ' ' + r.user.lastName}"></td>
                <td th:text="${r.rentalDate + ' → ' + r.returnDate}"></td>
                <td th:text="'Tk ' + ${#numbers.formatDecimal(r.totalAmount != null ? r.totalAmount : 0, 1, 2)}"></td>
                <td><span th:class="'badge badge-' + ${r.status.name().toLowerCase()}" th:text="${r.status}"></span></td>
                <td><a th:href="@{/rentals/{id}(id=${r.id})}" class="btn btn-outline btn-sm">View</a></td>
              </tr>
              <tr th:if="${#lists.isEmpty(rentals)}">
                <td colspan="6" style="text-align:center;color:#6b7280;padding:32px;">No rentals found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
