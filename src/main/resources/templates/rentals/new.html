<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('New Rental')}"></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/base :: sidebar('rentals')}"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">New Rental</div>
      <a th:href="@{/rentals}" class="btn btn-outline btn-sm">← Back</a>
    </div>
    <div class="page-content">
      <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
      <div class="card" style="max-width:720px;">
        <div class="card-header"><span class="card-title">Rental Details</span></div>
        <form th:action="@{/rentals/new}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div class="form-group">
              <label class="form-label">Start Date *</label>
              <input type="date" name="rentalDate" class="form-control" required
                     th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
            </div>
            <div class="form-group">
              <label class="form-label">Return Date *</label>
              <input type="date" name="returnDate" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Notes (optional)</label>
            <textarea name="notes" class="form-control" rows="2" placeholder="Any special instructions..."></textarea>
          </div>

          <hr class="divider">
          <div class="card-header" style="border:none;padding:0 0 12px;">
            <span class="card-title">Select Items</span>
            <span class="text-muted text-sm">Set quantity for items you need (0 = skip)</span>
          </div>

          <div th:each="p, iter : ${products}"
               style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #e5e7eb;">
            <span style="font-size:22px;" th:switch="${p.category.name()}">
              <span th:case="'CHAIR'">🪑</span><span th:case="'TABLE'">🪞</span>
              <span th:case="'CANOPY'">⛺</span><span th:case="'LINEN'">🪢</span>
              <span th:case="'LIGHTING'">💡</span><span th:case="'AUDIO'">🔊</span>
              <span th:case="*">📦</span>
            </span>
            <div style="flex:1;">
              <div class="fw-600" th:text="${p.name}"></div>
              <div class="text-sm text-muted" th:text="'Tk ' + ${p.dailyRate} + '/day · ' + ${p.availableQuantity} + ' available'"></div>
            </div>
            <input type="hidden" th:name="'items[' + ${iter.index} + '].productId'" th:value="${p.id}">
            <input type="number" th:name="'items[' + ${iter.index} + '].quantity'"
                   min="0" th:max="${p.availableQuantity}" value="0"
                   class="form-control" style="width:80px;text-align:center;"
                   th:disabled="${p.availableQuantity == 0}">
          </div>

          <div class="alert alert-warning" th:if="${#lists.isEmpty(products)}" style="margin-top:12px;">
            No products currently available.
          </div>

          <div style="margin-top:16px;">
            <button type="submit" class="btn btn-primary btn-lg"
                    th:disabled="${#lists.isEmpty(products)}">Submit Rental Request</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
