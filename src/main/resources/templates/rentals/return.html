<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Process Return')}"></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/base :: sidebar('rentals')}"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title" th:text="'Process Return — Rental #' + ${rental.id}">Return</div>
      <a th:href="@{/rentals/{id}(id=${rental.id})}" class="btn btn-outline btn-sm">← Back</a>
    </div>
    <div class="page-content">
      <div class="card" style="max-width:700px;">
        <div class="alert alert-info">
          <strong>Return date:</strong> <span th:text="${rental.returnDate}"></span> |
          <strong>Customer:</strong> <span th:text="${rental.user.firstName + ' ' + rental.user.lastName}"></span>
        </div>

        <form th:action="@{/rentals/{id}/return(id=${rental.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div th:each="item, iter : ${rental.rentalItems}" style="padding:16px 0;border-bottom:1px solid #e5e7eb;">
            <input type="hidden" th:name="'items[' + ${iter.index} + '].rentalItemId'" th:value="${item.id}"/>
            <div class="fw-600" style="margin-bottom:10px;" th:text="${item.product.name} + ' (Rented: ' + ${item.quantity} + ')'"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div class="form-group">
                <label class="form-label">Returned Quantity</label>
                <input type="number" th:name="'items[' + ${iter.index} + '].returnedQuantity'"
                       th:value="${item.quantity}" min="0" th:max="${item.quantity}" class="form-control"/>
              </div>
              <div class="form-group">
                <label class="form-label">Damage Fee (৳)</label>
                <input type="number" step="0.01" th:name="'items[' + ${iter.index} + '].damageFee'"
                       value="0" min="0" class="form-control"/>
              </div>
              <div class="form-group" style="grid-column:span 2;">
                <label class="form-label">Condition Notes</label>
                <input type="text" th:name="'items[' + ${iter.index} + '].conditionNotes'"
                       class="form-control" placeholder="Good condition / damaged / missing..."/>
              </div>
            </div>
          </div>

          <div style="margin-top:16px;">
            <button type="submit" class="btn btn-success btn-lg">✓ Complete Return</button>
            <a th:href="@{/rentals/{id}(id=${rental.id})}" class="btn btn-outline" style="margin-left:8px;">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
