<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Product Form')}"></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/base :: sidebar('products')}"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title" th:text="${isEdit} ? 'Edit Product' : 'New Product'">Product</div>
      <a th:href="@{/products}" class="btn btn-outline btn-sm">← Back to Products</a>
    </div>
    <div class="page-content">
      <div class="card" style="max-width:600px;">
        <form th:action="${isEdit} ? @{/products/edit/{id}(id=${productId})} : @{/products/new}"
              th:object="${productRequest}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group" style="grid-column:span 2;">
              <label class="form-label">Product Name *</label>
              <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'" placeholder="e.g. Folding Chair"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
              <label class="form-label">Category *</label>
              <select th:field="*{category}" class="form-control">
                <option value="">Select category...</option>
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
            </div>

            <div class="form-group">
              <label class="form-label">Daily Rate (৳) *</label>
              <input type="number" step="0.01" th:field="*{dailyRate}" class="form-control" placeholder="0.00"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('dailyRate')}" th:errors="*{dailyRate}"></div>
            </div>

            <div class="form-group">
              <label class="form-label">Total Quantity *</label>
              <input type="number" th:field="*{totalQuantity}" class="form-control" placeholder="10"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('totalQuantity')}" th:errors="*{totalQuantity}"></div>
            </div>

            <div class="form-group">
              <label class="form-label">Available Quantity *</label>
              <input type="number" th:field="*{availableQuantity}" class="form-control" placeholder="10"/>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('availableQuantity')}" th:errors="*{availableQuantity}"></div>
            </div>

            <div class="form-group" style="grid-column:span 2;">
              <label class="form-label">Replacement Value (৳)</label>
              <input type="number" step="0.01" th:field="*{replacementValue}" class="form-control" placeholder="0.00"/>
              <div class="form-hint">Used to calculate deposit (20% of replacement value).</div>
            </div>

            <div class="form-group" style="grid-column:span 2;">
              <label class="form-label">Description</label>
              <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Brief description..."></textarea>
            </div>

            <div class="form-group" style="grid-column:span 2;">
              <label class="form-label">Image URL (optional)</label>
              <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://..."/>
            </div>
          </div>

          <div class="d-flex gap-2" style="margin-top:8px;">
            <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update Product' : 'Create Product'">Save</button>
            <a th:href="@{/products}" class="btn btn-outline">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
