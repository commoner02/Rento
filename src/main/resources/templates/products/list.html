<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Products')}"></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/base :: sidebar('products')}"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Products</div>
      <div class="topbar-actions">
        <a th:href="@{/products/new}" sec:authorize="hasRole('ADMIN')" class="btn btn-primary btn-sm">+ Add Product</a>
      </div>
    </div>
    <div class="page-content">
      <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

      <!-- Category filter -->
      <div class="card mb-4" style="padding:12px 16px;">
        <div class="d-flex gap-2" style="flex-wrap:wrap;">
          <a th:href="@{/products}" th:classappend="${selectedCategory == null} ? ' btn-primary' : ' btn-outline'" class="btn btn-sm">All</a>
          <a th:each="cat : ${categories}"
             th:href="@{/products(category=${cat})}"
             th:text="${cat}"
             th:classappend="${selectedCategory == cat} ? ' btn-primary' : ' btn-outline'"
             class="btn btn-sm"></a>
        </div>
      </div>

      <div class="product-grid" th:if="${not #lists.isEmpty(products)}">
        <div th:each="p : ${products}" class="product-card">
          <!-- Product Image OR Icon -->
          <div class="product-card-img">
            <img th:if="${p.imageUrl != null and p.imageUrl != ''}"
                 th:src="${p.imageUrl}"
                 alt="Product Image"
                 style="width:100%;height:100%;object-fit:contain;">
            <span th:unless="${p.imageUrl != null and p.imageUrl != ''}" th:switch="${p.category.name()}">
              <span th:case="'CHAIR'">🪑</span>
              <span th:case="'TABLE'">🪞</span>
              <span th:case="'CANOPY'">⛺</span>
              <span th:case="'LINEN'">🪢</span>
              <span th:case="'LIGHTING'">💡</span>
              <span th:case="'AUDIO'">🔊</span>
              <span th:case="*">📦</span>
            </span>
          </div>
          <div class="product-card-body">
            <div class="product-card-name" th:text="${p.name}"></div>
            <div class="product-card-category" th:text="${p.category}"></div>
            <div th:if="${p.description}" class="text-muted text-sm" style="margin-bottom:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;" th:text="${p.description}"></div>
            <div class="d-flex justify-between align-center mt-4">
              <span class="product-card-price" th:text="'৳' + ${p.dailyRate} + '/day'"></span>
              <span th:if="${p.availableQuantity > 0}" class="product-card-avail" th:text="${p.availableQuantity} + ' avail'"></span>
              <span th:unless="${p.availableQuantity > 0}" style="font-size:12px;color:#ef4444;font-weight:500;">Out of stock</span>
            </div>
            <div style="margin-top:10px;display:flex;gap:6px;">
              <a th:href="@{/products/{id}(id=${p.id})}" class="btn btn-outline btn-sm" style="flex:1;justify-content:center;">View</a>
              <a th:href="@{/products/edit/{id}(id=${p.id})}" sec:authorize="hasRole('ADMIN')" class="btn btn-outline btn-sm">Edit</a>
              <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post" sec:authorize="hasRole('ADMIN')" onsubmit="return confirm('Delete this product?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger btn-sm">Del</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div class="empty-state" th:if="${#lists.isEmpty(products)}">
        <div class="empty-icon">📦</div>
        <h3>No products found</h3>
        <p>Try a different category or <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}">add a product</a>.</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
