<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Users')}"></head>
<body>
<div class="layout">
  <div th:replace="~{fragments/base :: sidebar('users')}"></div>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">User Management</div></div>
    <div class="page-content">
      <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody>
              <tr th:each="u : ${users}">
                <td th:text="${u.firstName + ' ' + u.lastName}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.phone ?: '—'}"></td>
                <td><span th:class="'badge badge-' + ${u.role.name().toLowerCase()}" th:text="${u.role}"></span></td>
                <td th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'dd MMM yyyy') : '—'}"></td>
                <td>
                  <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" style="display:inline-flex;gap:4px;align-items:center;">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <select name="role" class="form-control" style="width:100px;padding:5px 8px;font-size:12px;">
                      <option th:each="r : ${roles}" th:value="${r}" th:text="${r}" th:selected="${r == u.role}"></option>
                    </select>
                    <button type="submit" class="btn btn-outline btn-sm">Update</button>
                  </form>
                  <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline;"
                        onsubmit="return confirm('Delete this user?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
