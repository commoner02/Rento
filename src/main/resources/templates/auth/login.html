<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Rento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">R</div>
      <div style="font-size:11px;color:#6b7280;letter-spacing:.06em;text-transform:uppercase;font-weight:600;">RENTO</div>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    <div th:if="${param.error}" class="alert alert-danger">
      &#10007; Invalid email or password. Please try again.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
      &#10003; You have been signed out successfully.
    </div>
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <form th:action="@{/auth/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="username" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a th:href="@{/auth/register}">Create one</a>
    </div>

    <hr class="divider">
    <div style="background:#f9fafb;border-radius:6px;padding:12px;font-size:12px;color:#6b7280;line-height:2;">
      <strong style="color:#374151;">Demo accounts</strong>
      <div>admin@rento.com / admin123</div>
      <div>seller@rento.com / seller123</div>
      <div>buyer@rento.com / buyer123</div>
    </div>
  </div>
</div>
</body>
</html>
