<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Create Account — Rento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:460px;">
    <div class="auth-logo">
      <div class="logo-icon">R</div>
    </div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Start renting equipment today</p>

    <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" th:field="*{firstName}" class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" placeholder="John"/>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" th:field="*{lastName}" class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" placeholder="Doe"/>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="john@example.com"/>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone (optional)</label>
        <input type="tel" th:field="*{phone}" class="form-control" placeholder="01700-000000"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="Minimum 6 characters"/>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:4px;">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a th:href="@{/auth/login}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
