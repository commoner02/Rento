<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' — Rento'">Rento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<aside th:fragment="sidebar(activeNav)" class="sidebar">
  <div class="sidebar-brand">
    <div class="logo-icon">R</div>
    <div class="logo-text"><span>Ren</span>to</div>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section">Main</div>
    <a th:href="@{/dashboard}" th:classappend="${activeNav == 'dashboard'} ? ' active'" class="nav-item">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a th:href="@{/products}" th:classappend="${activeNav == 'products'} ? ' active'" class="nav-item">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      Products
    </a>
    <a th:href="@{/rentals}" th:classappend="${activeNav == 'rentals'} ? ' active'" class="nav-item">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      Rentals
    </a>

    <div sec:authorize="hasRole('ADMIN')">
      <div class="sidebar-section">Admin</div>
      <a th:href="@{/admin/users}" th:classappend="${activeNav == 'users'} ? ' active'" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </a>
      <a th:href="@{/admin/payments}" th:classappend="${activeNav == 'payments'} ? ' active'" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
        Payments
      </a>
      <a th:href="@{/products/new}" th:classappend="${activeNav == 'newproduct'} ? ' active'" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Add Product
      </a>
    </div>

    <div sec:authorize="hasRole('BUYER')">
      <div class="sidebar-section">Quick Actions</div>
      <a th:href="@{/rentals/new}" class="nav-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        New Rental
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" sec:authentication="name" th:with="uname=${#authentication.getName()}" th:text="${#strings.substring(uname, 0, 1).toUpperCase()}">U</div>
      <div>
        <div class="user-name" th:with="uname=${#authentication.getName()}" th:text="${#strings.substringBefore(uname, '@')}">User</div>
        <div class="user-role" sec:authorize="hasRole('ADMIN')">Admin</div>
        <div class="user-role" sec:authorize="hasRole('SELLER') and !hasRole('ADMIN')">Seller</div>
        <div class="user-role" sec:authorize="hasRole('BUYER')">Buyer</div>
      </div>
    </div>
    <form th:action="@{/auth/logout}" method="post" style="margin:0;"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/><button type="submit" class="btn btn-outline" style="width:100%;justify-content:center;font-size:13px;padding:7px;">Sign Out</button></form>
  </div>
</aside>

</body>
</html>
